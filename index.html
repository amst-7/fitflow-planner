<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #1e3a8a;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .header p {
            color: #64748b;
            font-size: 1.1rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            border: 1px solid #e2e8f0;
        }

        .card h2 {
            font-size: 1.5rem;
            color: #1e40af;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .goal-group {
            margin-bottom: 20px;
        }

        .goal-group label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .goal-group label:hover {
            background: #f0f4f8;
        }

        .goal-group input[type="radio"] {
            cursor: pointer;
            width: 20px;
            height: 20px;
            accent-color: #3b82f6;
        }

        .goal-group label span {
            color: #334155;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #334155;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #334155;
            border: 1px solid #cbd5e1;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .results-section {
            display: none;
        }

        .results-section.active {
            display: block;
        }

        .workout-routine {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            border: 1px solid #e2e8f0;
            margin-bottom: 30px;
        }

        .routine-header {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
        }

        .routine-header h3 {
            font-size: 1.8rem;
            color: #1e3a8a;
            margin-bottom: 10px;
        }

        .routine-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            font-size: 0.95rem;
        }

        .meta-label {
            font-weight: 600;
            color: #475569;
        }

        .day-section {
            margin-bottom: 30px;
            background: #f8fafc;
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #3b82f6;
        }

        .day-section h4 {
            font-size: 1.3rem;
            color: #1e40af;
            margin-bottom: 15px;
        }

        .exercise-list {
            list-style: none;
        }

        .exercise-item {
            background: white;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            border-left: 3px solid #10b981;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .exercise-name {
            font-weight: 600;
            color: #334155;
            flex: 1;
        }

        .exercise-details {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            font-size: 0.9rem;
            color: #64748b;
        }

        .detail-badge {
            background: #dbeafe;
            color: #0c4a6e;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
        }

        .nutrition-tip {
            background: #fffbeb;
            border-left: 4px solid #f59e0b;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .nutrition-tip h4 {
            color: #92400e;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .nutrition-tip p {
            color: #78350f;
            line-height: 1.6;
        }

        .recovery-tips {
            background: #f0fdf4;
            border-left: 4px solid #10b981;
            padding: 20px;
            border-radius: 8px;
        }

        .recovery-tips h4 {
            color: #166534;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .recovery-tips ul {
            list-style-position: inside;
            color: #166534;
            line-height: 1.8;
        }

        .back-button {
            margin-bottom: 20px;
        }

        .back-button button {
            width: auto;
            background: #f1f5f9;
            color: #334155;
            border: 1px solid #cbd5e1;
            padding: 10px 20px;
        }

        .back-button button:hover {
            background: #e2e8f0;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2rem;
            }

            .routine-meta {
                flex-direction: column;
            }

            .exercise-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .exercise-details {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💪 Workout Planner</h1>
            <p>Create personalized exercise routines based on your fitness goals</p>
        </div>

        <!-- Input Form Section -->
        <div id="inputSection" class="main-grid">
            <div class="card">
                <h2>🎯 Your Fitness Goal</h2>
                <div class="goal-group">
                    <label>
                        <input type="radio" name="goal" value="strength" checked>
                        <span>Build Strength</span>
                    </label>
                </div>
                <div class="goal-group">
                    <label>
                        <input type="radio" name="goal" value="endurance">
                        <span>Build Endurance</span>
                    </label>
                </div>
                <div class="goal-group">
                    <label>
                        <input type="radio" name="goal" value="flexibility">
                        <span>Improve Flexibility</span>
                    </label>
                </div>
                <div class="goal-group">
                    <label>
                        <input type="radio" name="goal" value="weight_loss">
                        <span>Weight Loss</span>
                    </label>
                </div>
                <div class="goal-group">
                    <label>
                        <input type="radio" name="goal" value="muscle_gain">
                        <span>Build Muscle</span>
                    </label>
                </div>
                <div class="goal-group">
                    <label>
                        <input type="radio" name="goal" value="recovery">
                        <span>Recovery & Mobility</span>
                    </label>
                </div>
            </div>

            <div class="card">
                <h2>📋 Workout Details</h2>
                
                <div class="form-group">
                    <label for="experience">Experience Level</label>
                    <select id="experience">
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced">Advanced</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="days">Days per Week</label>
                    <select id="days">
                        <option value="3">3 days</option>
                        <option value="4">4 days</option>
                        <option value="5">5 days</option>
                        <option value="6">6 days</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="duration">Workout Duration (minutes)</label>
                    <select id="duration">
                        <option value="30">30 minutes</option>
                        <option value="45">45 minutes</option>
                        <option value="60">60 minutes</option>
                        <option value="90">90 minutes</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="equipment">Available Equipment</label>
                    <textarea id="equipment" placeholder="e.g., Dumbbells, Barbell, Treadmill, or 'None' for bodyweight only"></textarea>
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="generateWorkout()">Generate Workout Plan</button>
                </div>
            </div>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" class="results-section">
            <div class="back-button">
                <button class="btn-secondary" onclick="backToForm()">← Back to Form</button>
            </div>
            <div id="workoutResults"></div>
        </div>
    </div>

            recovery: 'Recovery & Mobility'

        const nutritionTips = {
            strength: 'Focus on protein intake (0.8-1g per lb of bodyweight) to support muscle recovery. Include complex carbs for energy and healthy fats for hormone production.',

        function generateWorkout() {
            const goal = document.querySelector('input[name="goal"]:checked').value;
            const experience = document.getElementById('experience').value;
            const days = document.getElementById('days').value;
            const duration = document.getElementById('duration').value;
            const equipment = document.getElementById('equipment').value || 'Not specified';

            const exercises = getExercises(goal, experience, days, duration);
            
            if (!exercises) {
                alert('This combination is not available. Please select a different combination.');
                return;
            }

            displayResults(goal, experience, days, duration, equipment, exercises);
        }

        function getExercises(goal, experience, days, duration) {
            try {
                return workoutData[goal][experience][days][duration];
            } catch (e) {
                return null;
            }
        }

        function displayResults(goal, experience, days, duration, equipment, exercises) {
            const resultsSection = document.getElementById('resultsSection');
            const workoutResults = document.getElementById('workoutResults');

            const daysArray = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
            const selectedDays = daysArray.slice(0, parseInt(days));

            let html = `
                <div class="workout-routine">
                    <div class="routine-header">
                        <h3>${goalNames[goal]} Plan</h3>
                        <div class="routine-meta">
                            <div class="meta-item">
                                <span class="meta-label">Experience:</span>
                                <span>${experience.charAt(0).toUpperCase() + experience.slice(1)}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Frequency:</span>
                                <span>${days} days/week</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Duration:</span>
                                <span>${duration} minutes</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Equipment:</span>
                                <span>${equipment}</span>
                            </div>
                        </div>
                    </div>
            `;

            selectedDays.forEach((day, index) => {
                html += `
                    <div class="day-section">
                        <h4>📅 ${day}</h4>
                        <ul class="exercise-list">
                `;

                exercises.forEach(ex => {
                    const parts = ex.match(/(.+?)\s*\((.+?)\)/);
                    if (parts) {
                        const name = parts[1];
                        const details = parts[2];
                        html += `
                            <li class="exercise-item">
                                <span class="exercise-name">${name}</span>
                                <div class="exercise-details">
                                    <span class="detail-badge">${details}</span>
                                </div>
                            </li>
                        `;
                    }
                });

                html += `
                        </ul>
                    </div>
                `;
            });

            html += `
                    <div class="nutrition-tip">
                        <h4>🥗 Nutrition Recommendation</h4>
                        <p>${nutritionTips[goal]}</p>
                    </div>

                    <div class="recovery-tips">
                        <h4>💤 Recovery Tips</h4>
                        <ul>
                            <li>${recoveryTips[goal]}</li>
                        </ul>
                    </div>
                </div>
            `;

            workoutResults.innerHTML = html;
            document.getElementById('inputSection').style.display = 'none';
            resultsSection.classList.add('active');
            window.scrollTo(0, 0);
        }

        function backToForm() {
            document.getElementById('inputSection').style.display = 'grid';
            document.getElementById('resultsSection').classList.remove('active');
            window.scrollTo(0, 0);
        }
    </script>
